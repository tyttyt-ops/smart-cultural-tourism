<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧文旅调研 - 粤见未来调研队</title>
    <style>
        /* 马卡龙配色方案 */
        :root {
            --macaron-pink: #ffb3ba;
            --macaron-blue: #bae1ff;
            --macaron-green: #baffc9;
            --macaron-yellow: #ffffba;
            --macaron-purple: #d5a6bd;
            --macaron-orange: #ffdfba;
            --macaron-teal: #baffef;
            --bg-color: #f9f7f7;
            --text-color: #555;
            --card-bg: #ffffff;
            --accent-color: #ffb3ba;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "SimHei", "Microsoft YaHei", sans-serif;
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            font-size: 16px;
        }
        
        .container {
            width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .header {
            background: linear-gradient(135deg, var(--macaron-blue), var(--macaron-pink));
            padding: 60px 0;
            text-align: center;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            font-size: 36px;
            color: #000000;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        .header p {
            font-size: 18px;
            color: #000000;
            font-weight: bold;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .nav-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin: 40px 0;
        }
        
        .nav-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            text-align: center;
            width: 300px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border-top: 4px solid var(--macaron-yellow);
        }
        
        .nav-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        
        .nav-card h2 {
            font-size: 22px;
            color: var(--macaron-purple);
            margin-bottom: 15px;
            font-weight: bold;
        }
        
        .nav-card p {
            color: #000000;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        .nav-card a {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, var(--macaron-pink), var(--macaron-blue));
            color: #000000;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .nav-card a:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 179, 186, 0.3);
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px 0;
            background: linear-gradient(135deg, var(--macaron-blue), var(--macaron-pink));
            border-radius: 30px 30px 0 0;
            color: #000000;
            font-weight: bold;
        }
        
        @media (max-width: 768px) {
            .container {
                width: 100%;
                padding: 20px 10px;
            }
            
            .header h1 {
                font-size: 28px;
            }
            
            .nav-card {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>智慧文旅调研 - 粤见未来调研队</h1>
        <p>探索粤港澳大湾区AI融合文旅的创新实践与发展趋势</p>
    </div>
    
    <div class="container">
        <div class="nav-links">
            <div class="nav-card">
                <h2>游客体验</h2>
                <p>面向游客的广东智慧文旅介绍，包含VR体验、AR导览、云游博物馆、数字藏品等内容</p>
                <a href="h1.html">进入游客体验</a>
            </div>
            
            <div class="nav-card">
                <h2>调研报告</h2>
                <p>详细的粤港澳大湾区AI融合文旅调研报告，包含调研概况、数据可视化、案例分析等</p>
                <a href="h2.html">查看调研报告</a>
            </div>
            
            <div class="nav-card">
                <h2>IP设计平台</h2>
                <p>数字IP形象设计平台，集成腾讯云智能创作API与Luma AI API，为景区设计专属数字IP</p>
                <a href="h3.html">进入设计平台</a>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <p>智慧文旅调研 - 粤见未来调研队 © 2026</p>
    </div>
</body>
</html>
